name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # manuális indítás

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---- LINT & SYNTAX CHECK ----
  lint:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Check Python syntax
        run: |
          python -m compileall src/backend/ -q || echo "::warning::Syntax check failed on some files"
          flake8 src/backend/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=templates || true

  # ---- DOCKER BUILD ----
  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          push: false
          load: true
          tags: epub-translator-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Ollama image
        uses: docker/build-push-action@v6
        with:
          context: src/ollama
          push: false
          load: true
          tags: epub-translator-ollama:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images
        run: |
          docker images | grep epub-translator
          echo "✅ All images built successfully"

  # ---- PUSH TO GITHUB CONTAINER REGISTRY (only on tags) ----
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- RELEASE (on version tags) ----
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EPUB Translator ${{ github.ref_name }}"
          body: |
            ## 🚀 EPUB Translator ${{ github.ref_name }}

            ### Telepítés
            ```bash
            bash install.sh
            ```

            ### Változások
            - CI/CD pipeline GitHub Actions-szel
            - Swagger API dokumentáció (`/api/docs/`)
            - WebSocket támogatás valós idejű progress követéshez
            - Alembic adatbázis migráció

            ### Docker képek
            A konténer képek elérhetők a GitHub Container Registry-ben:
            ```
            ghcr.io/sorosg/epub-translate:${{ github.ref_name }}
            ```
          draft: false
          prerelease: false
          generate_release_notes: true