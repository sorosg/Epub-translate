# EPUB Fordító – Nginx konfiguráció (HTTPS + automatikus HTTP→HTTPS redirect)
# Let's Encrypt tanúsítványok a /etc/letsencrypt mappából
events { worker_connections 1024; }
http {
    client_max_body_size 200M;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # HTTP → HTTPS redirect (csak ha van SSL tanúsítvány)
    server {
        listen 80;
        server_name _;
        
        # Let's Encrypt ACME challenge (a certbot HTTP-01 validációjához)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }
        
        # Proxy a backend felé (HTTP-n, amíg a HTTPS nincs érvényes tanúsítvánnyal)
        location /health { return 200 "OK"; }
        location /api/ { proxy_pass http://backend:5000; }
        location /static { alias /usr/share/nginx/html/static; expires 30d; }
        location / { proxy_pass http://backend:5000; }
    }

    # HTTPS szerver (csak akkor aktív, ha a tanúsítványok léteznek)
    server {
        listen 443 ssl;
        server_name _;

        # SSL tanúsítványok – ha nem léteznek, a konténer nem indul el HTTPS-en
        # A docker-compose volume mount biztosítja a fájlokat
        ssl_certificate     /etc/letsencrypt/live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/privkey.pem;
        
        # Modern SSL beállítások
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS (csak akkor, ha van érvényes SSL tanúsítvány)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        location /health { return 200 "OK"; }
        location /api/ { proxy_pass http://backend:5000; }
        location /static { alias /usr/share/nginx/html/static; expires 30d; }
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }
        location / { proxy_pass http://backend:5000; }
    }
}