# EPUB Fordító – Nginx konfiguráció (HTTP only)
# HTTPS a későbbiekben a configure_ssl() funkcióval állítható be (install.sh 4. menüpont)
events { worker_connections 1024; }
http {
    client_max_body_size 200M;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name _;
        
        # Let's Encrypt ACME challenge (a későbbi SSL tanúsítványhoz)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }
        
        location /health { return 200 "OK"; }
        location /api/ { proxy_pass http://backend:5000; }
        location /static { alias /usr/share/nginx/html/static; expires 30d; }
        location / { proxy_pass http://backend:5000; }
    }
}